    <style>
      /* basic shit */
      body {
        background-color: #3f2853;
        background-image: url("resources/mtdrawing2.png");
        background-repeat: no-repeat;
        background-size: cover;
        font-family: sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        color: #fff;
      }
      marquee {
        color: #fff;
        font-size: 32px;
        font-weight: bold;
      }
      /* navbar */
      .navbar {
        list-style-type: none;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #664c87e3;
        position: fixed;
        top: 0;
        width: 100%;
      }
      .navbar li {
        float: left;
      }
      .navbar li a, .drophover {
        display: inline-block;
        color: white;
        text-align: center;
        padding: 14px 16px;

        transition-duration: 0.3s;
      }
      .navbar li a:hover, .dropdown:hover .drophover {
        background-color: #271935;
      }
      .navbar li.dropdown {
        display: inline-block;
      }
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: #664c87e3;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        z-index: 1;
      }
      .dropdown-content a {
        color: white;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        text-align: left;
      }
      .dropdown-content a:hover {
        background-color: #271935;
      }
      .dropdown:hover .dropdown-content {
        display: block;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
