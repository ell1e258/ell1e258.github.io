<!DOCTYPE html>
<!-- PixelCat main page -->
<html>
  <head>
    <title>PixelCat Main Page | Ell1e258</title>
    <link rel="icon" href="/resources/mtdrawing2.ico" />
    <style>
      /* basic shit */
      body {
        background-color: #644117;
        font-family: sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        color: #fff;
        text-align: center;
      }
      marquee {
        color: #fff;
        font-size: 32px;
        font-weight: bold;
      }
      /* navbar */
      .navbar {
        list-style-type: none;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #AA6F27e3;
        position: fixed;
        top: 0;
        width: 100%;
      }
      .navbar li {
        float: left;
      }
      .navbar li a, .drophover {
        display: inline-block;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        transition-duration: 0.3s;
      }
      .navbar li a:hover, .dropdown:hover .drophover {
        background-color: #150E05;
      }
      .navbar li.dropdown {
        display: inline-block;
      }
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: #AA6F27e3;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        z-index: 1;
      }
      .dropdown-content a {
        color: white;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        text-align: left;
      }
      .dropdown-content a:hover {
        background-color: #150E05;
      }
      .dropdown:hover .dropdown-content {
        display: block;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th {
        padding: 8px;
        text-align: center;
        border-bottom: 1px solid #fff;
        background-color: #AA6F27;
        transition-duration: 0.3s;
      }
      td {
        padding: 8px;
        text-align: left;
        border-bottom: 1px solid #fff;
        background-color: #AA6F27;
        transition-duration: 0.3s;
      }
      tr:hover {
        background-color: #150E05;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
  </head>
  <body>
    <!-- Navbar -->
    <ul class="navbar">
      <li>
        <a href="https://ell1e258.github.io">Home</a>
      </li>
      <li>
        <a href="https://ell1e258.github.io/pixelcat/">PixelCat</a>
      </li>
    </ul>
    <br>
    <br>
    <br>
    <!-- main -->
    <marquee scrollamount="15">PixelCat</marquee>
    <br>
    <br>
    <h2>Raodmap</h2>
    <br>
    <br>
    <table style="width:100%">
      <tr>
        <th style="width:50%">Project</th>
        <th style="width:25%">Status</th>
        <th style="width:25%">ETA</th>
      </tr>
      <tr>
        <td>PixelCat Creative</td>
        <td>Coming Next</td>
        <td>N/A</td>
      </tr>
  </body>
</html>
